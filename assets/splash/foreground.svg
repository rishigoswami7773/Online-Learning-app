<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="g" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#6A4BC0"/>
      <stop offset="100%" stop-color="#4A2EA6"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="18" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Transparent full canvas -->
  <rect width="100%" height="100%" fill="none"/>

  <!-- Rounded emblem -->
  <circle cx="512" cy="512" r="420" fill="url(#g)" filter="url(#shadow)" />

  <!-- Stylized "OL" letters as logo mark -->
  <g fill="#FFFFFF" font-family="Segoe UI, Roboto, Arial, sans-serif" font-weight="800" text-anchor="middle" dominant-baseline="central">
    <text x="512" y="520" font-size="360">OL</text>
  </g>

  <!-- Subtle book glyph (simple) -->
  <g transform="translate(420,680) scale(0.9)" fill="#FFFFFF" opacity="0.95">
    <path d="M20 8c0-2.2 1.8-4 4-4h120c2.2 0 4 1.8 4 4v72c0 2.2-1.8 4-4 4H24c-2.2 0-4-1.8-4-4V8z" fill="#FFFFFF" opacity="0.06"/>
    <path d="M28 18h108v56H28z" fill="#FFFFFF" opacity="0.12"/>
  </g>

  <!-- Tiny accent dot -->
  <circle cx="512" cy="880" r="6" fill="#FFFFFF" opacity="0.15" />
</svg>
